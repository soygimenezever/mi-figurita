<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Mi Figurita</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; text-align: center; }
        #contenedor-principal { width: 100%; max-width: 400px; margin: 20px auto; border: 1px solid #ccc; background: white; padding: 10px; border-radius: 10px; }
        #canvas-figurita { width: 100% !important; height: auto !important; display: block; }
        h1 { 
            margin-bottom: 5px; /* Reduce el espacio debajo del h1 */
        }

        .subtitulo-docente { /* Asegúrate de que tu span tenga esta clase */
            margin-top: 0;
            display: block; /* Para que respete los márgenes */
        }
        .controles { display: flex; flex-direction: column; gap: 10px; max-width: 350px; margin: 0 auto; padding: 20px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px; border: none; border-radius: 5px; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #btnDescargar { background: #28a745; }
    </style>
</head>
<body>

    <h1>Mi Figurita</h1>
    <span style="display: block; margin-top: -10px;">La Scaloneta Docente</span> 
    <div id="contenedor-principal">
        <canvas id="canvas-figurita" width="400" height="533"></canvas>
    </div>

    <div class="controles">
        <input type="file" id="subirFoto" accept="image/*"><br><br>
        <input type="text" id="inputNombre" placeholder="Nombre y apellido">
        <input type="text" id="inputClub" placeholder="Escuela / Cargo"><br><br>
        <button id="btnGenerar">Generar Figurita</button>
        <button id="btnDescargar">Descargar</button>
    </div>

    <div id="overlay-carga" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); color:white; justify-content:center; align-items:center; flex-direction:column; z-index:9999;">
        <h2>⚙️ Procesando imagen...</h2>
        <p>Esto puede tardar algunos minutos, por favor espera.</p>
    </div>

    <script type="module">
        import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@latest/+esm';

        // Inicializar Canvas con la proporción de tu imagen
        const canvas = new fabric.Canvas('canvas-figurita',{
            width: 400,  // Reducimos la resolución interna para que no sea pesada
            height: 533
        });
        
        // Cargar el modelo base y forzarlo a caber en el canvas
        fabric.Image.fromURL('modelo.png', (img) => {
            img.scaleToWidth(400); // Ajusta al ancho del canvas definido arriba
            // img.scaleToHeight(533);
            img.selectable = false;
            canvas.add(img);
            canvas.sendToBack(img);
        });

        document.getElementById('btnGenerar').addEventListener('click', async () => {
            const fileInput = document.getElementById('subirFoto');
            const overlay = document.getElementById('overlay-carga');
            if (!fileInput.files[0]) return alert("Selecciona una foto");

            const btn = document.getElementById('btnGenerar');
            btn.innerText = "Procesando...";
            btn.disabled = true;
            overlay.style.display = "flex";

            try {
                const blob = await removeBackground(fileInput.files[0]);
                const url = URL.createObjectURL(blob);

                fabric.Image.fromURL(url, (img) => {
                    img.set({
                        left: 100, 
                        top: 150,
                        lockUniScaling: true, // Bloquea la deformación
                        cornerColor: 'blue',
                        cornerSize: 10,
                        transparentCorners: false
                    });

                    // Mantiene proporción: scaleToWidth escala el ancho y ajusta la altura automáticamente
                    img.scaleToWidth(200); 

                    // La imagen se añade y el usuario puede moverla/escalarla
                    canvas.add(img);
                    canvas.setActiveObject(img);
                    
                    // Textos - Ajustados para el canvas de altura 533
                    const nombre = document.getElementById('inputNombre').value.toUpperCase();
                    const club = document.getElementById('inputClub').value.toUpperCase();

                    const w = canvas.width;
                    const h = canvas.height;

                    const txtNombre = new fabric.Text(nombre, { 
                        left: w * 0.4,           // Centrado horizontal
                        top: h * 0.88,           // Bajado al 81% de la altura
                        fontSize: h * 0.045,     // Tamaño grande para el nombre
                        fill: '#FFFFFF',         // Color blanco
                        originX: 'center', 
                        originY: 'center',
                        fontFamily: 'Arial', 
                        fontWeight: 'bold',      // Negrita para el nombre
                        textAlign: 'center'
                    });

                    const txtClub = new fabric.Text(club, { 
                        left: w * 0.4,           // Centrado horizontal
                        top: h * 0.96,           // Bajado al 91% de la altura
                        fontSize: h * 0.028,     // Tamaño un poco más pequeño para el club
                        fill: '#FFFFFF',         // Color blanco
                        originX: 'center', 
                        originY: 'center',
                        fontFamily: 'Arial',
                        textAlign: 'center'
                    });

                    canvas.add(txtNombre, txtClub);
                    // Aseguramos que los textos siempre estén encima
                    canvas.bringToFront(txtNombre);
                    canvas.bringToFront(txtClub);
                    
                    btn.innerText = "Generar Figurita";
                    btn.disabled = false;
                    overlay.style.display = "none";
                });
            } catch (e) {
                console.error(e);
                alert("Error al procesar la imagen");
                btn.innerText = "Generar Figurita";
                btn.disabled = false;
                overlay.style.display = "none";
            }
        });

        document.getElementById('btnDescargar').addEventListener('click', () => {
            const dataURL = canvas.toDataURL({ format: 'png', multiplier: 2 }); // Multiplier 2 mejora la calidad de exportación
            const link = document.createElement('a');
            link.download = 'mi_figurita.png';
            link.href = dataURL;
            link.click();
        });
    </script>
</body>
</html>
